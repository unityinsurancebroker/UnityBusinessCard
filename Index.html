<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammed Mohtashim Ghouse - Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="p-4 sm:p-6">

    <main class="w-full max-w-md mx-auto">
        
            
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 relative animate-fade-in">
                <!-- Header -->
                <div class="h-48 bg-white relative flex items-center justify-center pb-8 border-b border-slate-50">
                    <img id="cardLogo" src="https://image2url.com/r2/default/images/1770284108070-34b364c2-1d8d-4375-a951-a3b382107aab.jpg" alt="Logo" class="h-20 w-auto object-contain p-1">
                </div>

                <!-- Profile -->
                <div class="px-6 pb-10 relative">
                    <div class="relative -mt-16 mb-5 flex justify-center">
                        <div class="w-32 h-32 rounded-full border-[5px] border-white shadow-lg overflow-hidden bg-white">
                            <img id="cardPhoto" src="https://image2url.com/r2/default/images/1770283875733-72584282-5d0f-45a8-9150-aa6a88ce720d.jpeg" alt="Profile" class="w-full h-full object-cover object-top">
                        </div>
                    </div>

                    <div class="text-center space-y-1">
                        <h1 id="cardName" class="text-2xl font-bold text-slate-900 tracking-tight">Mohammed Mohtashim Ghouse</h1>
                        <p id="cardJob" class="text-primary-600 font-semibold text-sm uppercase tracking-wide">Risk Manager</p>
                        <p id="cardCompany" class="text-slate-500 text-sm">Unity Insurance Broker</p>
                        
                        <div class="flex items-center justify-center gap-2 text-slate-400 text-xs mt-3">
                            <i class="fas fa-map-marker-alt"></i>
                            <span id="cardLocation">Abu Dhabi, UAE</span>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="grid grid-cols-4 gap-3 mt-8">
                        <a id="btnCall" href="tel:+971566377330" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-100 transition-all group hover:shadow-md">
                            <div class="w-8 h-8 rounded-full bg-white text-primary-600 shadow-sm border border-slate-100 flex items-center justify-center mb-1 group-hover:scale-110 transition-transform"><i class="fas fa-phone text-sm"></i></div>
                            <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-500 group-hover:text-primary-600">Call</span>
                        </a>
                        <a id="btnEmail" href="mailto:mohtashim.g@unityinsurance.ae" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-100 transition-all group hover:shadow-md">
                            <div class="w-8 h-8 rounded-full bg-white text-primary-600 shadow-sm border border-slate-100 flex items-center justify-center mb-1 group-hover:scale-110 transition-transform"><i class="fas fa-envelope text-sm"></i></div>
                            <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-500 group-hover:text-primary-600">Email</span>
                        </a>
                        <a id="btnWeb" href="https://www.unityinsurance.ae/" target="_blank" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-100 transition-all group hover:shadow-md">
                            <div class="w-8 h-8 rounded-full bg-white text-primary-600 shadow-sm border border-slate-100 flex items-center justify-center mb-1 group-hover:scale-110 transition-transform"><i class="fas fa-globe text-sm"></i></div>
                            <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-500 group-hover:text-primary-600">Web</span>
                        </a>
                        <button onclick="downloadVCard()" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 hover:bg-slate-100 border border-slate-100 transition-all group hover:shadow-md">
                            <div class="w-8 h-8 rounded-full bg-white text-primary-600 shadow-sm border border-slate-100 flex items-center justify-center mb-1 group-hover:scale-110 transition-transform"><i class="fas fa-save text-sm"></i></div>
                            <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-500 group-hover:text-primary-600">Save</span>
                        </button>
                    </div>

                    <!-- Contact List -->
                    <div class="mt-8 space-y-3">
                        <!-- Mobile -->
                        <div class="flex items-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm hover:border-primary-100 transition-colors">
                            <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-50 text-primary-600"><i class="fas fa-mobile-alt"></i></div>
                            <div class="flex-1 ml-3">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Mobile</p>
                                <p id="listPhone" class="text-sm font-medium text-slate-800">+971 566377330</p>
                            </div>
                            <button id="btnCopyPhone" onclick="copyToClipboard(document.getElementById('inputPhone').value)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary-600 hover:bg-slate-50 rounded-full transition-all"><i class="far fa-copy"></i></button>
                        </div>
                        
                        <!-- Landline (Static) -->
                        <div id="wrapperLandline" class="flex items-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm hover:border-primary-100 transition-colors">
                            <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-50 text-primary-600"><i class="fas fa-phone-alt"></i></div>
                            <div class="flex-1 ml-3">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Landline</p>
                                <p id="listLandline" class="text-sm font-medium text-slate-800">+971 2 222 2205</p>
                            </div>
                            <button id="btnCopyLandline" onclick="copyToClipboard(document.getElementById('inputLandline').value)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary-600 hover:bg-slate-50 rounded-full transition-all"><i class="far fa-copy"></i></button>
                        </div>

                        <!-- Email -->
                        <div class="flex items-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm hover:border-primary-100 transition-colors">
                            <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-50 text-primary-600"><i class="far fa-envelope"></i></div>
                            <div class="flex-1 ml-3">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Email</p>
                                <p id="listEmail" class="text-xs sm:text-xs sm:text-sm font-medium text-slate-800 break-all">mohtashim.g@unityinsurance.ae</p>
                            </div>
                            <button id="btnCopyEmail" onclick="copyToClipboard(document.getElementById('inputEmail').value)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary-600 hover:bg-slate-50 rounded-full transition-all"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Toast -->
                <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-medium opacity-0 transition-opacity duration-300 pointer-events-none shadow-xl z-50 flex items-center gap-2">
                    <i class="fas fa-check-circle text-emerald-400"></i>
                    <span id="toastMsg">Copied!</span>
                </div>
            </div>
        
    </main>

    <script>
        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast("Copied!"));
            } else {
                let ta = document.createElement("textarea");
                ta.value = text;
                ta.style.position="fixed"; ta.style.left="-9999px";
                document.body.appendChild(ta); ta.focus(); ta.select();
                try { document.execCommand('copy'); showToast("Copied!"); } catch(e){}
                document.body.removeChild(ta);
            }
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            if(t) {
                t.querySelector('#toastMsg').innerText = msg;
                t.classList.remove('opacity-0');
                setTimeout(() => t.classList.add('opacity-0'), 2000);
            }
        }
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Mohammed Mohtashim Ghouse
N:Mohtashim Ghouse;Mohammed;;;
TITLE:Risk Manager
ORG:Unity Insurance Broker
TEL;TYPE=CELL,VOICE:+971566377330
TEL;TYPE=WORK,VOICE:+97122222205
EMAIL;TYPE=WORK:mohtashim.g@unityinsurance.ae
URL:https://www.unityinsurance.ae/
ADR;TYPE=WORK:;;Abu Dhabi, UAE
END:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = "Mohammed_Mohtashim Ghouse.vcf";
            a.href = url;
            a.click();
        }
    </script>
</body>
</html>
